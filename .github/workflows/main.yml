name: Build Xiaozhi ESP32

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Firmware
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.5
          target: esp32s3
          command: |
            python scripts/release.py bread-compact-wifi-128x64

      - name: Upload Firmware
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: |
            releases/**
